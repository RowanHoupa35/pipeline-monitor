services:
  monitor:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Persist logs between container restarts
      - ./logs:/app/logs
    environment:
      - OLLAMA_HOST=http://localhost:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    network_mode: host
    restart: unless-stopped
